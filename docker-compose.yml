services:
  pg_db:
    container_name: guard_pg
    image: postgres:16
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - guard-network

  app:
    container_name: guard-panel-api
    build:
      context: .
      dockerfile: Dockerfile
      target: local
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
      - "${GRPC_PORT}:${GRPC_PORT}"
    env_file:
      - .env
    depends_on:
      pg_db:
        condition: service_healthy
    networks:
      - guard-network

volumes:
  postgres_data:

networks:
  guard-network:
    driver: bridge
