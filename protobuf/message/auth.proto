syntax = "proto3";

package guard.v1;

option go_package = "github.com/gigasigmaslav/guard-panel-api/pkg/api/v1/message";

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";
import "message/common.proto";

message SignUpRequest {
  int64 employee_id = 1 [(validate.rules).int64.gt = 0, (google.api.field_behavior) = REQUIRED];
  string password = 2 [(validate.rules).string = {min_len: 8, max_len: 256}, (google.api.field_behavior) = REQUIRED];
}

message SignInRequest {
  int64 employee_id = 1 [(validate.rules).int64.gt = 0, (google.api.field_behavior) = REQUIRED];
  string password = 2 [(validate.rules).string = {min_len: 1, max_len: 256}, (google.api.field_behavior) = REQUIRED];
}

message AuthTokensResponse {
  string access_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message WhoAmIResponse {
  int64 employee_id = 1;
  string full_name = 2;
  EmployeePosition position = 3;
}
