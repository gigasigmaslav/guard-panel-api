syntax = "proto3";

package guard.v1;
option go_package = "github.com/gigasigmaslav/guard-panel-api/pkg/api/v1/message";

import "google/api/field_behavior.proto";
import "validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "message/common.proto";

message VudDecision {
  int64 id = 1;
  int64 task_id = 2;
  bool criminal_case_opened = 3;
  string comment = 4;
  string kusp = 5;
  string ud = 6;
  Lookup created_by = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CreateVudDecisionRequest {
  int64 task_id = 1 [(validate.rules).int64.gt = 0,(google.api.field_behavior) = REQUIRED];
  string kusp = 2 [(validate.rules).string = {max_len: 10}, (google.api.field_behavior) = REQUIRED];
  int64 created_by_id = 3 [(validate.rules).int64.gt = 0, (google.api.field_behavior) = REQUIRED];
  optional string ud = 4 [(validate.rules).string = {max_len: 25}];
  optional bool criminal_case_opened = 5;
  optional string comment = 6;
}

message UpdateVudDecisionRequest {
  int64 id = 1 [(validate.rules).int64.gt = 0, (google.api.field_behavior) = REQUIRED];
  optional string kusp = 2 [(validate.rules).string = {max_len: 10}];
  optional string ud = 3 [(validate.rules).string = {max_len: 25}];
  optional bool criminal_case_opened = 4;
  optional string comment = 5;
}