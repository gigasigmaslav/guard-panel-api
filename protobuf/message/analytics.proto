syntax = "proto3";

package guard.v1;

option go_package = "github.com/gigasigmaslav/guard-panel-api/pkg/api/v1/message";

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

message GetTaskDashboardKPIRequest {
  optional google.protobuf.Timestamp period_from = 1;
  optional google.protobuf.Timestamp period_to = 2;
}

message GetTaskDashboardKPIResponse {
  int64 active_tasks_count = 1;
  int64 completed_in_period = 2;
  int64 created_in_period = 3;
  optional double completed_to_created_ratio = 4;
  optional TopExecutorByCompleted top_executor = 5;

  message TopExecutorByCompleted {
    int64 executor_id = 1 [(google.api.field_behavior) = REQUIRED];
    string executor_name = 2 [(google.api.field_behavior) = REQUIRED];
    int64 completed_tasks = 3 [(google.api.field_behavior) = REQUIRED];
  }
}
