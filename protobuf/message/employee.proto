syntax = "proto3";
package guard.v1;
option go_package = "github.com/gigasigmaslav/guard-panel-api/pkg/api/v1/message";

import "google/api/field_behavior.proto";
import "validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "message/common.proto";

message Employee {
  int64 id = 1;
  string full_name = 2;
  EmployeePosition position = 3 [(validate.rules).enum.defined_only = true];
  Lookup created_by = 4;
  google.protobuf.Timestamp created_at = 6;
}

message CreateEmployeeRequest {
  string full_name = 1 [(validate.rules).string.min_len = 1, (google.api.field_behavior) = REQUIRED];
  EmployeePosition position = 2 [(validate.rules).enum = {defined_only: true, not_in: [0]}, (google.api.field_behavior) = REQUIRED];
}

message UpdateEmployeeRequest {
  int64 id = 1 [(validate.rules).int64.gt = 0, (google.api.field_behavior) = REQUIRED];
  optional string full_name = 2;
  optional EmployeePosition position = 3 [(validate.rules).enum.defined_only = true];
}

message SearchEmployeesResponse {
  repeated Employee items = 1;
}